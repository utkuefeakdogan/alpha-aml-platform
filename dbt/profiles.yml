alpha_aml:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'password') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'datadb') }}"
      schema: aml
      threads: 2
    # CI target: used only for `dbt parse` in GitHub Actions (no live DB required).
    ci:
      type: postgres
      host: localhost
      port: 5432
      user: ci
      password: ci
      dbname: ci
      schema: aml
      threads: 1
