x-common-env: &common-env
  POSTGRES_USER: ${POSTGRES_USER:-user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
  POSTGRES_DB: ${POSTGRES_DB:-datadb}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  KAFKA_TOPIC_RAW: transactions.raw

services:
  zookeeper:
    profiles: ["core"]
    image: confluentinc/cp-zookeeper:7.5.3
    mem_limit: 384m
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aml-net

  kafka:
    profiles: ["core"]
    image: confluentinc/cp-kafka:7.5.3
    mem_limit: 768m
    depends_on:
      zookeeper:
        condition: service_healthy
    # No host port mapping: Kafka is reachable only inside the Docker network
    # (kafka:29092). The PLAINTEXT_HOST listener on 9092 stays bound inside the
    # container for the local healthcheck, but is never exposed to the internet.
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    networks:
      - aml-net

  postgres:
    profiles: ["core", "ops"]
    image: postgres:16-alpine
    mem_limit: 1024m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-datadb}
    # No host port mapping: Postgres is reachable only inside the Docker network
    # (postgres:5432). Never expose the database to the internet; use
    # `docker exec ... psql` for admin access.
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./docker/init-airflow-db.sql:/docker-entrypoint-initdb.d/02-init-airflow-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-datadb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aml-net

  transaction-gen:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile.generator
    mem_limit: 256m
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      TXN_INTERVAL_MIN_SEC: ${TXN_INTERVAL_MIN_SEC:-10}
      TXN_INTERVAL_MAX_SEC: ${TXN_INTERVAL_MAX_SEC:-20}
      SCENARIO_CATALOG_PATH: /app/configs/scenario_catalog.json
      SCENARIO_WAKE_MIN_SEC: ${SCENARIO_WAKE_MIN_SEC:-1200}
      SCENARIO_WAKE_MAX_SEC: ${SCENARIO_WAKE_MAX_SEC:-5400}
      SCENARIO_WAKE_JITTER_SEC: ${SCENARIO_WAKE_JITTER_SEC:-300}
      SCENARIO_DAILY_CAP: ${SCENARIO_DAILY_CAP:-100}
      SCENARIO_RULE_COOLDOWN_SEC: ${SCENARIO_RULE_COOLDOWN_SEC:-10800}
      NORMAL_MAX_AMOUNT_EUR: ${NORMAL_MAX_AMOUNT_EUR:-8500}
      RULES_JSON_PATH: /app/configs/rules.json
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
    restart: unless-stopped
    networks:
      - aml-net

  spark-job:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile.processing
    mem_limit: 1536m
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      SPARK_MASTER: local[2]
      SPARK_DRIVER_MEMORY: 512m
      SPARK_EXECUTOR_MEMORY: 512m
      CHECKPOINT_DIR: /tmp/spark-checkpoints
      RULES_PATH: /app/configs/rules.yaml
      RULES_JSON_PATH: /app/configs/rules.json
      DAILY_ALERT_CAP: ${DAILY_ALERT_CAP:-100}
      PER_RULE_DAILY_CAP: ${PER_RULE_DAILY_CAP:-12}
    volumes:
      - spark-checkpoints:/tmp/spark-checkpoints
      - ./src:/app/src
      - ./configs:/app/configs
    restart: unless-stopped
    networks:
      - aml-net

  streamlit:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    mem_limit: 384m
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Bound to localhost only: public traffic comes in via Caddy (443) over the
      # internal network (streamlit:8501). 127.0.0.1 keeps the SSH tunnel working
      # for local debugging while never exposing unencrypted HTTP to the internet.
      - "127.0.0.1:8501:8501"
    environment:
      <<: *common-env
      RULES_PATH: /app/configs/rules.yaml
      RULES_JSON_PATH: /app/configs/rules.json
      SCENARIO_CATALOG_PATH: /app/configs/scenario_catalog.json
      FREESQL_USER: ${FREESQL_USER:-freesql_reader}
      FREESQL_PASSWORD: ${FREESQL_PASSWORD:-freesql_readonly_2026}
      FREESQL_CONTACT_EMAIL: ${FREESQL_CONTACT_EMAIL:-compliance@alpha-aml.local}
    command:
      - streamlit
      - run
      - src/dashboard/app.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true
      - --server.enableCORS=false
      - --server.enableXsrfProtection=false
      - --server.fileWatcherType=none
      - --browser.gatherUsageStats=false
    volumes:
      - ./configs:/app/configs
      - ./src:/app/src
    restart: unless-stopped
    networks:
      - aml-net

  sar-worker:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile.ai
    mem_limit: 256m
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      SAR_MOCK_MODE: ${SAR_MOCK_MODE:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    restart: unless-stopped
    networks:
      - aml-net

  airflow-init:
    profiles: ["ops"]
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: alpha-aml/airflow:2.8.4
    mem_limit: 512m
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/airflow_meta
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@localhost || true"
    networks:
      - aml-net

  airflow:
    profiles: ["ops"]
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: alpha-aml/airflow:2.8.4
    mem_limit: 1200m
    # Auto-recover from transient DB/DNS blips (e.g. when postgres is recreated);
    # the scheduler runs as a single process and otherwise exits permanently.
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      # SequentialExecutor runs one task at a time inside the scheduler process
      # (no per-task fork). For the hourly cleanup/audit jobs this is plenty and
      # keeps the container's memory footprint small and predictable.
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/airflow_meta
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      # Trim DAG-parsing overhead on the constrained VM: single parser process,
      # parse each file at most every 2 min instead of the 30 s default.
      AIRFLOW__SCHEDULER__PARSING_PROCESSES: "1"
      AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "120"
      AIRFLOW_CONN_POSTGRES_AML: postgresql+psycopg2://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-datadb}
      DBT_PROJECT_DIR: /opt/airflow/dbt
      TXN_RETENTION_DAYS: ${TXN_RETENTION_DAYS:-90}
      RAW_RETENTION_HOURS: ${RAW_RETENTION_HOURS:-24}
      FLAGGED_RETENTION_DAYS: ${FLAGGED_RETENTION_DAYS:-180}
      SAR_RETENTION_DAYS: ${SAR_RETENTION_DAYS:-180}
      METRICS_RETENTION_HOURS: ${METRICS_RETENTION_HOURS:-4}
      METRICS_MAX_ROWS: ${METRICS_MAX_ROWS:-50000}
      DISK_GUARD_HOST_ROOT: /host
      DISK_WARN_PCT: ${DISK_WARN_PCT:-80}
      DISK_CRITICAL_PCT: ${DISK_CRITICAL_PCT:-90}
      PG_DB_WARN_BYTES: ${PG_DB_WARN_BYTES:-32212254720}
      METRICS_EMERGENCY_MAX_ROWS: ${METRICS_EMERGENCY_MAX_ROWS:-200000}
      SAR_MOCK_MODE: ${SAR_MOCK_MODE:-true}
      # Gold → BigQuery export bridge (export_to_bigquery DAG)
      GCP_PROJECT: ${GCP_PROJECT:-}
      GCS_BUCKET: ${GCS_BUCKET:-}
      BQ_DATASET: ${BQ_DATASET:-aml_analytics}
      BQ_LOCATION: ${BQ_LOCATION:-EU}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/opt/airflow/secrets/gcp-sa.json}
      GCS_RETENTION_DAYS: ${GCS_RETENTION_DAYS:-7}
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
      - ./src:/opt/airflow/src
      - ./configs:/opt/airflow/configs
      - ./secrets:/opt/airflow/secrets:ro
      - /:/host:ro
    command: >
      bash -c "airflow connections add postgres_aml --conn-type postgres --conn-host postgres --conn-login $${POSTGRES_USER:-user} --conn-password $${POSTGRES_PASSWORD:-password} --conn-schema datadb --conn-port 5432 2>/dev/null || true &&
               exec airflow scheduler"
    networks:
      - aml-net

  # ----------------------------------------------------------------------------
  # Edge: HTTPS reverse proxy (TLS termination via automatic Let's Encrypt).
  # Start with: docker compose --profile edge up -d caddy
  # Requires SITE_ADDRESS (e.g. my-aml.duckdns.org) + ACME_EMAIL in .env, and
  # ports 80/443 open in the Oracle Cloud Security List + OS firewall.
  # ----------------------------------------------------------------------------
  caddy:
    profiles: ["edge"]
    image: caddy:2.8-alpine
    mem_limit: 128m
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?set SITE_ADDRESS in .env, e.g. my-aml.duckdns.org}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    networks:
      - aml-net

  # Optional: keep the DuckDNS A-record pointed at this VM. Oracle public IPs are
  # usually static, so this is belt-and-suspenders. Set DUCKDNS_SUBDOMAINS (the
  # part before .duckdns.org) and DUCKDNS_TOKEN in .env.
  duckdns:
    profiles: ["edge"]
    image: lscr.io/linuxserver/duckdns:latest
    mem_limit: 64m
    environment:
      SUBDOMAINS: ${DUCKDNS_SUBDOMAINS:-}
      TOKEN: ${DUCKDNS_TOKEN:-}
      LOG_FILE: "false"
    restart: unless-stopped
    networks:
      - aml-net

networks:
  aml-net:
    driver: bridge

volumes:
  pgdata:
  spark-checkpoints:
  caddy-data:
  caddy-config:
